  <script>
    // 渲染文章
    async function loadArticle() {
      const root = document.getElementById('article-root');
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');

      if (!slug) {
        root.innerHTML = '<div class="article-error">❌ 文章 slug 参数缺失<br><br><a href="./#news">返回教学资讯</a></div>';
        return;
      }

      try {
        // 1. 加载文章列表，找到对应文章
        const listResp = await fetch('articles.json');
        const articles = await listResp.json();
        const article = articles.find(a => a.slug === slug);

        if (!article) {
          root.innerHTML = '<div class="article-error">❌ 未找到该文章<br><br><a href="./#news">返回教学资讯</a></div>';
          return;
        }

        // 2. 加载 Markdown 文件
        const mdResp = await fetch(`articles/${slug}.md`);
        if (!mdResp.ok) throw new Error('Markdown 文件不存在');
        const md = await mdResp.text();

        // 3. 解析 front matter（极简解析）
        const fmMatch = md.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
        let content = md;
        if (fmMatch) {
          content = fmMatch[2];
        }

        // 4. 渲染 HTML
        const html = marked.parse(content);

        // 5. 注入文章结构
        root.innerHTML = `
          <div class="article-header">
            <h1>${article.title}</h1>
            <div class="article-meta">
              ${article.tags.map(t => `<span class="article-tag">${t}</span>`).join('')}
              <span>📅 ${article.date}</span>
              <span>· 小陶老师</span>
            </div>
          </div>
          <div class="article-body">${html}</div>
          <div style="margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--gray-light, #F3F4F6); text-align: center;">
            <p style="color: var(--gray, #6B7280); margin-bottom: 16px;">🎁 喜欢这篇文章？</p>
            <a href="./#news" style="display:inline-block; padding:12px 28px; background: var(--purple-deep, #5B2EBF); color:white; border-radius:8px; text-decoration:none; font-weight:600;">查看更多文章 →</a>
          </div>
        `;

        // 6. 更新页面标题
        document.title = `${article.title} | MaxKB FDE 教学`;

        // 7. 触发代码高亮
        if (window.Prism) {
          Prism.highlightAll();
        }

      } catch (err) {
        root.innerHTML = `<div class="article-error">❌ 文章加载失败：${err.message}<br><br><a href="./#news">返回教学资讯</a></div>`;
      }
    }

    loadArticle();
  </script>
